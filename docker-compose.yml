version: "3.8"

services:
  trainingedge:
    build:
      context: .
      dockerfile: Dockerfile
    image: trainingedge:intervals-v1
    container_name: trainingedge
    restart: unless-stopped
    
    # Network configuration
    networks:
      - trainingedge-net
    
    # Port mapping
    ports:
      - "8080:8000"
    
    # Environment variables
    environment:
      # === REQUIRED: Intervals.icu API Configuration ===
      - INTERVALS_API_KEY=${INTERVALS_API_KEY}
      - INTERVALS_ATHLETE_ID=${INTERVALS_ATHLETE_ID:-0}
      - INTERVALS_API_BASE=${INTERVALS_API_BASE:-https://intervals.icu/api/v1}
      
      # === Path Configuration (NAS-Compatible) ===
      - TRAININGEDGE_BASE_DIR=/app
      - REPORTS_DIR=/app/reports
      - TRAININGEDGE_STATE_DIR=/app/state
      - TRAININGEDGE_DB_PATH=/app/state/training_edge.db
      
      # === Web Application Settings ===
      - TRAININGEDGE_PASSWORD=${TRAININGEDGE_PASSWORD:-}
      - TRAININGEDGE_SESSION_SECRET=${TRAININGEDGE_SESSION_SECRET:-}
      
      # === Auto-Sync Settings ===
      - TRAININGEDGE_SYNC_INTERVAL_HOURS=${TRAININGEDGE_SYNC_INTERVAL_HOURS:-6}
      
      # === Run Mode ===
      # Options: web (default), cron (web + cron), sync (one-time)
      - MODE=${MODE:-cron}
    
    # Volumes for persistent data
    volumes:
      # Wellness data volume (Oura reports, database)
      - wellness_data:/app/state
      
      # Reports output directory (mount NAS folder here)
      - ${REPORTS_HOST_PATH:-./reports}:/app/reports
      
      # Optional: Mount host timezone
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (adjust for your NAS)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

# Named volumes
volumes:
  wellness_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WELLNESS_DATA_PATH:-./state}

# Network
networks:
  trainingedge-net:
    driver: bridge
